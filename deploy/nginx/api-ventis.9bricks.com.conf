# ---------------------------------------------------------------------------
# api-ventis.9bricks.com → 301 redirect to the canonical API host api.ventis.vn
# (kept only to forward old links; the API now lives on api.ventis.vn).
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name api-ventis.9bricks.com;

    ssl_certificate     /etc/letsencrypt/live/api-ventis.9bricks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-ventis.9bricks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://api.ventis.vn$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api-ventis.9bricks.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://api.ventis.vn$request_uri;
    }
}
