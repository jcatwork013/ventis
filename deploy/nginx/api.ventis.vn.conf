# ---------------------------------------------------------------------------
# api.ventis.vn → Go API container on 127.0.0.1:18090
# TLS: Let's Encrypt origin cert — Cloudflare SSL "Full (strict)" compatible.
# CORS handled by the Go API (ALLOWED_ORIGINS=https://ventis.vn).
# body limit raised to 15m for admin image uploads.
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name api.ventis.vn;

    ssl_certificate     /etc/letsencrypt/live/api.ventis.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ventis.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15m;

    location / {
        proxy_pass         http://127.0.0.1:18090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 15s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.ventis.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
