# ---------------------------------------------------------------------------
# ventis.vn (+ www) → Next.js frontend container on 127.0.0.1:13100
# TLS: Let's Encrypt origin cert — Cloudflare SSL "Full (strict)" compatible.
# www.ventis.vn 301-redirects to the apex for a single canonical host.
# ---------------------------------------------------------------------------

# Canonical apex — serves the app.
server {
    listen 443 ssl http2;
    server_name ventis.vn;

    ssl_certificate     /etc/letsencrypt/live/ventis.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventis.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:13100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:13100;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:ico|svg|png|jpe?g|webp|avif|gif|css|js|woff2?)$ {
        proxy_pass http://127.0.0.1:13100;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000";
    }

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# www → apex redirect (HTTPS).
server {
    listen 443 ssl http2;
    server_name www.ventis.vn;

    ssl_certificate     /etc/letsencrypt/live/ventis.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventis.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ventis.vn$request_uri;
}

# HTTP → HTTPS (and ACME challenge passthrough).
server {
    listen 80;
    listen [::]:80;
    server_name ventis.vn www.ventis.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://ventis.vn$request_uri;
    }
}
